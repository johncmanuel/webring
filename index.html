<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="icon" href="https://fartlabs.org/favicon.ico">
		<title>etok webring</title>
		<script src="https://cdn.jsdelivr.net/gh/diamondburned/libwebring@nightly/dist/webring-element.js" type="module"></script>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/diamondburned/libwebring@nightly/dist/webring.css">
		<style>
			:root { --color-alpha: white; --color-beta: black; }
			body { padding: 0; margin: 0 0 0 0; background-color: var(--color-alpha); color: var(--color-beta); font-family: serif; max-width: 900px; line-height: 1.6; }
			body a { color: var(--color-beta); text-decoration: none; }
			body a:hover { background-color: var(--color-beta); color: var(--color-alpha); }
			body > ol { margin: 30px; padding: 0px 30px 30px; column-count: 3; display: block; border-bottom: 2px solid var(--color-beta); }
			body > ol > li { padding-right: 30px; }
			body > ol > li a.rss { display: none; }
			body > ol > li a:visited:before, body > ol > li a:visited:after { color: var(--color-alpha); }
			body > footer { margin: 30px; }
			body > footer > p { max-width: 600px; }
			html:target li a.rss { background: var(--color-beta); color: var(--color-alpha); display: inline; }
			body > ol > li:target a { color: var(--color-alpha); }
			body > ol > li:target { background: var(--color-beta); }
			@media screen and (max-width: 800px) { body > ol { column-count: 2; } }
			@media screen and (max-width: 600px) { body > ol { column-count: 1; } }
			@media (prefers-color-scheme: dark) {
				:root { --color-alpha: black; --color-beta: white; }
			}
		</style>
	</head>
	<body>
		<webring-element name="etok" src="/webring.json"></webring-element>
		<ol id="icons">
			<li data-lang="en" id="etok">
				<a href="https://etok.me">etok</a>
			</li>
		</ol>
		<footer>
			<p class="readme">
				A webring for FartLabs members and friends. Hand-crafted sites welcome.
			</p>
			<p>
				To join, submit a <a href="https://github.com/FartLabs/webring" target="_blank">pull request</a> adding yourself to <code>webring.json</code>.<br />
				Keep it simple: hand-crafted wikis, portfolios, and personal sites.<br />
				<a href="random.html">Random site</a>
			</p>
		</footer>
	</body>
</html>
