<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="refresh" content="0;url=https://etok.me">
		<title>Redirecting...</title>
	</head>
	<body>
		<p>Redirecting to a random site...</p>
		<script>
			var sites = [
				"https://etok.me"
			];
			var random = sites[Math.floor(Math.random() * sites.length)];
			window.location.replace(random);
		</script>
	</body>
</html>
